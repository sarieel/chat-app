<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="LoveChat" />
  <meta name="theme-color" content="#F5F0F4" />
  <title>LoveChat 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:wght@500;700&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --love: #E8475F;
      --love-soft: #FF6B8A;
      --love-light: #FFB3C6;
      --love-pale: #FFF0F3;
      --love-glow: rgba(232, 71, 95, 0.25);
      --love-deep: #C73650;
      --gold: #D4A574;
      --gold-light: #F0D5B8;
      --lavender: #B8A9C9;
      --lavender-soft: #E8DFF0;
      --bg-primary: #F5F0F4;
      --bg-warm: #FAF6F8;
      --bg-card: #FFFFFF;
      --text-primary: #2D1B30;
      --text-secondary: #8B7A8E;
      --text-tertiary: #B8A9B8;
      --border-color: rgba(232, 71, 95, 0.08);
      --divider: rgba(45, 27, 48, 0.04);
      --red-badge: #E8475F;
      --bubble-user: linear-gradient(135deg, #E8475F, #FF6B8A);
      --bubble-ai: #FFFFFF;
      --avatar-grad-1: linear-gradient(135deg, #FFB3C6, #FF6B8A);
      --avatar-grad-2: linear-gradient(135deg, #E8DFF0, #B8A9C9);
      --avatar-grad-3: linear-gradient(135deg, #F0D5B8, #D4A574);
      --avatar-grad-4: linear-gradient(135deg, #D4F0FF, #7CC4E8);
      --avatar-grad-5: linear-gradient(135deg, #FFE0B2, #FFB74D);
      --avatar-grad-6: linear-gradient(135deg, #C8E6C9, #81C784);
      --header-h: 48px;
      --tab-h: 56px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --shadow-soft: 0 2px 16px rgba(232, 71, 95, 0.06);
      --shadow-card: 0 4px 20px rgba(45, 27, 48, 0.04);
      --shadow-float: 0 8px 32px rgba(232, 71, 95, 0.10);
    }

    html, body {
      height: 100%; height: 100dvh; overflow: hidden;
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: var(--bg-primary); color: var(--text-primary);
      -webkit-font-smoothing: antialiased; font-size: 15px; line-height: 1.5;
      overscroll-behavior-y: contain; touch-action: manipulation;
    }

    /* ========== FLOATING HEARTS BACKGROUND ========== */
    .hearts-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .floating-heart {
      position: absolute; opacity: 0;
      animation: floatHeart linear infinite;
      filter: blur(0.3px); will-change: transform, opacity;
      width: 10px; height: 10px;
      background: var(--love-light);
      border-radius: 50%;
    }
    .floating-heart::before, .floating-heart::after {
      content: ''; position: absolute; width: 10px; height: 10px;
      background: var(--love-light); border-radius: 50%;
    }
    .floating-heart::before { top: -5px; left: 0; }
    .floating-heart::after { top: 0; left: 5px; }
    @keyframes floatHeart {
      0%   { opacity: 0; transform: translateY(100vh) rotate(0deg) scale(0.3); }
      8%   { opacity: 0.2; }
      50%  { opacity: 0.12; }
      85%  { opacity: 0.06; }
      100% { opacity: 0; transform: translateY(-10vh) rotate(360deg) scale(0.6); }
    }

    /* ========== APP SHELL ========== */
    .app-shell { display: flex; flex-direction: column; height: 100%; height: 100dvh; position: relative; overflow: hidden; z-index: 1; }

    /* ========== STATUS BAR ========== */
    .status-bar {
      height: var(--safe-top); min-height: 20px;
      background: linear-gradient(135deg, var(--love), var(--love-soft));
      width: 100%; flex-shrink: 0;
    }

    /* ========== HEADER ========== */
    .header {
      height: var(--header-h);
      background: linear-gradient(135deg, var(--love) 0%, var(--love-soft) 100%);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px; flex-shrink: 0; position: relative; z-index: 10;
      box-shadow: 0 2px 12px var(--love-glow);
    }
    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 700; color: #fff;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .header-actions { display: flex; gap: 6px; align-items: center; }
    .header-btn {
      background: rgba(255,255,255,0.15); border: none; color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 50%;
      transition: background 0.2s, transform 0.15s;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .header-btn:active { background: rgba(255,255,255,0.25); transform: scale(0.92); }
    .header-btn svg { width: 20px; height: 20px; }

    /* Sub-page header */
    .header-sub {
      height: var(--header-h);
      background: linear-gradient(135deg, var(--love) 0%, var(--love-soft) 100%);
      display: flex; align-items: center; padding: 0 12px;
      flex-shrink: 0; position: relative; z-index: 10;
      box-shadow: 0 2px 12px var(--love-glow);
    }
    .header-sub .back-btn {
      background: rgba(255,255,255,0.15); border: none; color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 50%; margin-right: 8px;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      transition: background 0.15s;
    }
    .header-sub .back-btn:active { background: rgba(255,255,255,0.25); }
    .header-sub .back-btn svg { width: 20px; height: 20px; }
    .header-sub .sub-title {
      flex: 1; text-align: center; font-size: 17px; font-weight: 600; color: #fff;
      margin-right: 42px; letter-spacing: 0.3px;
    }
    .header-sub .sub-actions { position: absolute; right: 12px; display: flex; gap: 10px; }

    /* ========== PAGE CONTAINERS ========== */
    .page-container { flex: 1; position: relative; overflow: hidden; }
    .page {
      position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch; background: var(--bg-primary);
      display: none; flex-direction: column;
    }
    .page.active { display: flex; }
    .page::-webkit-scrollbar { display: none; }

    /* ========== TAB BAR ========== */
    .tab-bar {
      height: calc(var(--tab-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: 0.5px solid var(--border-color);
      display: flex; align-items: stretch; flex-shrink: 0;
      position: relative; z-index: 20;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; cursor: pointer;
      background: none; border: none; color: var(--text-tertiary);
      transition: color 0.25s; position: relative;
      -webkit-user-select: none; user-select: none;
    }
    .tab-item.active { color: var(--love); }
    .tab-item.active::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 20px; height: 3px; border-radius: 0 0 3px 3px;
      background: var(--love);
    }
    .tab-item svg { width: 24px; height: 24px; transition: transform 0.2s; }
    .tab-item.active svg { transform: scale(1.08); }
    .tab-item .tab-label { font-size: 10px; font-weight: 500; line-height: 1.2; }
    .tab-badge {
      position: absolute; top: 0; right: 50%; transform: translateX(18px);
      background: var(--love); color: #fff; font-size: 10px;
      min-width: 16px; height: 16px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px; font-weight: 600;
      box-shadow: 0 2px 6px var(--love-glow);
    }

    /* ========== CHAT LIST ========== */
    .chat-list-page { background: var(--bg-warm); }
    .chat-search-bar { padding: 10px 16px; }
    .chat-search-wrap { position: relative; display: flex; align-items: center; }
    .chat-search-wrap svg {
      position: absolute; left: 14px; width: 16px; height: 16px;
      color: var(--text-tertiary); pointer-events: none;
    }
    .chat-search-input {
      width: 100%; height: 38px; border-radius: 20px;
      background: var(--bg-card); border: 1px solid var(--border-color);
      outline: none; padding: 0 14px 0 38px; font-size: 14px;
      color: var(--text-primary); font-family: inherit;
      box-shadow: var(--shadow-soft);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .chat-search-input:focus {
      border-color: var(--love-light);
      box-shadow: 0 0 0 3px rgba(232, 71, 95, 0.08);
    }

    .chat-item {
      display: flex; align-items: center; padding: 14px 16px;
      cursor: pointer; position: relative;
      transition: background 0.15s, transform 0.15s;
      background: none; border: none; width: 100%;
      text-align: left; font: inherit; color: inherit;
      -webkit-appearance: none; appearance: none;
    }
    .chat-item:active { background: var(--love-pale); transform: scale(0.985); }
    .chat-item::after {
      content: ''; position: absolute; bottom: 0; left: 80px; right: 16px;
      height: 0.5px; background: var(--divider);
    }
    .chat-item:last-child::after { display: none; }
    .chat-avatar {
      width: 52px; height: 52px; border-radius: var(--radius-md); flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 26px; padding-top: 1px; overflow: hidden;
      box-shadow: var(--shadow-soft);
      position: relative;
    }
    .chat-avatar::after {
      content: ''; position: absolute; inset: -2px; border-radius: calc(var(--radius-md) + 2px);
      background: linear-gradient(135deg, var(--love-light), var(--lavender-soft));
      z-index: -1; opacity: 0; transition: opacity 0.2s;
    }
    .chat-item:first-child .chat-avatar::after { opacity: 1; }
    .chat-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-md); }
    .chat-info { flex: 1; margin-left: 14px; min-width: 0; }
    .chat-info-top { display: flex; justify-content: space-between; align-items: center; }
    .chat-name { font-size: 16px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-time { font-size: 11px; color: var(--text-tertiary); flex-shrink: 0; margin-left: 8px; }
    .chat-preview { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }
    .chat-badge {
      background: linear-gradient(135deg, var(--love), var(--love-soft));
      color: #fff; font-size: 10px;
      min-width: 20px; height: 20px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 6px; font-weight: 600; flex-shrink: 0; margin-top: 4px;
      box-shadow: 0 2px 8px var(--love-glow);
    }

    /* ========== CHAT WINDOW ========== */
    .chat-window {
      position: absolute; inset: 0; z-index: 50;
      background: var(--bg-warm);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      pointer-events: none;
    }
    .chat-window.open { transform: translateX(0); pointer-events: auto; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 14px 16px; -webkit-overflow-scrolling: touch; }
    .chat-messages::-webkit-scrollbar { display: none; }

    .msg-row { display: flex; margin-bottom: 16px; align-items: flex-start; gap: 10px; animation: msgIn 0.3s ease-out; }
    .msg-row.user { flex-direction: row-reverse; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .msg-avatar {
      width: 40px; height: 40px; border-radius: var(--radius-sm); flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 20px; padding-top: 1px; overflow: hidden; box-shadow: var(--shadow-soft);
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg-bubble {
      max-width: 72%; padding: 12px 16px; font-size: 15px; line-height: 1.6;
      word-break: break-word; position: relative;
    }
    .msg-row.ai .msg-bubble {
      background: var(--bg-card); color: var(--text-primary);
      border-radius: 4px var(--radius-md) var(--radius-md) var(--radius-md);
      box-shadow: var(--shadow-card);
    }
    .msg-row.user .msg-bubble {
      background: var(--bubble-user); color: #fff;
      border-radius: var(--radius-md) 4px var(--radius-md) var(--radius-md);
      box-shadow: 0 4px 16px var(--love-glow);
    }
    .msg-time-label {
      text-align: center; font-size: 11px; color: var(--text-tertiary);
      margin: 10px 0 14px; letter-spacing: 0.5px;
    }

    .chat-input-bar {
      padding: 10px 14px; padding-bottom: calc(10px + var(--safe-bottom));
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      display: flex; align-items: flex-end; gap: 8px;
      border-top: 0.5px solid var(--border-color);
    }
    .chat-input-bar .voice-btn, .chat-input-bar .extra-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: none; cursor: pointer; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
      color: var(--text-secondary); transition: color 0.15s, background 0.15s;
    }
    .chat-input-bar .voice-btn:active, .chat-input-bar .extra-btn:active { background: var(--love-pale); color: var(--love); }
    .chat-input-bar textarea {
      flex: 1; border: 1px solid var(--border-color); background: var(--bg-warm);
      border-radius: 20px; padding: 9px 16px; font-size: 15px; resize: none;
      outline: none; max-height: 100px; min-height: 38px; line-height: 1.4;
      font-family: inherit; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .chat-input-bar textarea:focus {
      border-color: var(--love-light);
      box-shadow: 0 0 0 3px rgba(232, 71, 95, 0.06);
    }
    .chat-input-bar .send-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--love), var(--love-soft));
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 3px 12px var(--love-glow);
    }
    .chat-input-bar .send-btn:active { transform: scale(0.88); }
    .chat-input-bar .send-btn.disabled { opacity: 0.35; box-shadow: none; }
    .chat-input-bar .send-btn svg { width: 18px; height: 18px; color: #fff; }

    /* ========== CONTACTS ========== */
    .contacts-page { background: var(--bg-warm); }
    .contact-section-title {
      font-size: 13px; color: var(--text-secondary); padding: 12px 18px 6px;
      font-weight: 500; letter-spacing: 0.5px;
    }
    .contact-item {
      display: flex; align-items: center; padding: 12px 18px;
      cursor: pointer; position: relative; transition: background 0.15s;
      background: none; border: none; width: 100%;
      text-align: left; font: inherit; color: inherit;
      -webkit-appearance: none; appearance: none;
    }
    .contact-item:active { background: var(--love-pale); }
    .contact-item::after {
      content: ''; position: absolute; bottom: 0; left: 72px; right: 18px;
      height: 0.5px; background: var(--divider);
    }
    .contact-avatar {
      width: 44px; height: 44px; border-radius: var(--radius-sm); flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 22px; padding-top: 1px; box-shadow: var(--shadow-soft);
    }
    .contact-name { margin-left: 14px; font-size: 15px; font-weight: 500; color: var(--text-primary); }
    .contact-item .chevron { margin-left: auto; color: var(--text-tertiary); }

    /* ========== MOMENTS / DISCOVER ========== */
    .discover-page { background: var(--bg-primary); }

    .moments-header {
      position: relative; height: 300px; overflow: hidden;
      background: linear-gradient(160deg, #2D1B30 0%, #4A2040 30%, #6B2D5B 60%, #E8475F 100%);
    }
    .moments-header-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(255, 107, 138, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(184, 169, 201, 0.15) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(212, 165, 116, 0.08) 0%, transparent 60%);
    }
    .moments-header-stars {
      position: absolute; inset: 0; overflow: hidden;
    }
    .header-star {
      position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; }
    }
    .moments-header-content {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 24px 20px; display: flex; align-items: flex-end; gap: 14px;
    }
    .moments-user-avatar {
      width: 68px; height: 68px; border-radius: var(--radius-md);
      border: 3px solid rgba(255,255,255,0.6);
      background: linear-gradient(135deg, var(--love-soft), var(--lavender));
      display: grid; place-items: center;
      font-size: 34px; padding-top: 2px; flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    .moments-user-info { flex: 1; min-width: 0; }
    .moments-user-name {
      font-size: 20px; font-weight: 700; color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .moments-user-signature {
      font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .moments-camera-btn {
      position: absolute; top: 14px; right: 18px;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.12); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.15s;
    }
    .moments-camera-btn:active { background: rgba(255,255,255,0.25); transform: scale(0.9); }
    .moments-camera-btn svg { width: 20px; height: 20px; color: #fff; }

    /* Moment posts */
    .moments-feed { padding: 0; }
    .moment-post {
      background: var(--bg-card); padding: 16px 18px;
      margin-bottom: 8px;
      border-radius: 0;
    }
    .moment-post:first-child { border-radius: var(--radius-lg) var(--radius-lg) 0 0; margin-top: -12px; position: relative; z-index: 2; }
    .moment-post-header { display: flex; gap: 12px; align-items: flex-start; }
    .moment-avatar {
      width: 44px; height: 44px; border-radius: var(--radius-sm); flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 24px; padding-top: 1px; overflow: hidden; box-shadow: var(--shadow-soft);
    }
    .moment-content { flex: 1; min-width: 0; }
    .moment-name { font-size: 15px; font-weight: 600; color: var(--love); }
    .moment-text { font-size: 15px; color: var(--text-primary); margin-top: 6px; line-height: 1.6; white-space: pre-wrap; }
    .moment-images { display: grid; gap: 4px; margin-top: 10px; max-width: 270px; }
    .moment-images.cols-1 { grid-template-columns: 1fr; max-width: 210px; }
    .moment-images.cols-2 { grid-template-columns: 1fr 1fr; }
    .moment-images.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .moment-img { width: 100%; aspect-ratio: 1; border-radius: var(--radius-sm); overflow: hidden; }
    .moment-img-placeholder {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .moment-footer { display: flex; justify-content: flex-end; margin-top: 10px; gap: 18px; }
    .moment-action {
      display: flex; align-items: center; gap: 5px; cursor: pointer;
      background: none; border: none; color: var(--text-tertiary);
      font-size: 13px; padding: 4px 8px; border-radius: 12px;
      transition: color 0.15s, background 0.15s;
    }
    .moment-action:active { background: var(--love-pale); }
    .moment-action.liked { color: var(--love); }
    .moment-action svg { width: 18px; height: 18px; }
    .moment-location { font-size: 12px; color: var(--love-soft); margin-top: 6px; display: flex; align-items: center; gap: 4px; }
    .moment-location svg { width: 12px; height: 12px; }

    /* ========== ME PAGE ========== */
    .me-page { background: var(--bg-primary); }

    .me-profile-card {
      margin: 8px 16px 0; padding: 24px 20px;
      background: linear-gradient(145deg, var(--love) 0%, var(--love-soft) 60%, var(--lavender) 100%);
      border-radius: var(--radius-lg); cursor: pointer;
      position: relative; overflow: hidden;
      box-shadow: 0 6px 24px var(--love-glow);
      transition: transform 0.2s;
    }
    .me-profile-card:active { transform: scale(0.98); }
    .me-profile-card::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    .me-profile-card::after {
      content: ''; position: absolute; bottom: -20px; left: -20px;
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }
    .me-profile-inner { display: flex; align-items: center; gap: 16px; position: relative; z-index: 1; }
    .me-avatar {
      width: 68px; height: 68px; border-radius: var(--radius-md); flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 34px; padding-top: 2px; overflow: hidden;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.4);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .me-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .me-info { flex: 1; min-width: 0; }
    .me-name { font-size: 20px; font-weight: 700; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    .me-wxid { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
    .me-wxid .qr-icon { width: 14px; height: 14px; color: rgba(255,255,255,0.5); }
    .me-profile-card .chevron { color: rgba(255,255,255,0.6); flex-shrink: 0; }

    .me-menu-group {
      margin: 10px 16px 0; background: var(--bg-card);
      border-radius: var(--radius-md); overflow: hidden;
      box-shadow: var(--shadow-soft);
    }
    .me-menu-item {
      display: flex; align-items: center; padding: 15px 18px;
      cursor: pointer; position: relative; transition: background 0.15s;
    }
    .me-menu-item:active { background: var(--love-pale); }
    .me-menu-item::after {
      content: ''; position: absolute; bottom: 0; left: 60px; right: 18px;
      height: 0.5px; background: var(--divider);
    }
    .me-menu-item:last-child::after { display: none; }
    .me-menu-icon {
      width: 32px; height: 32px; border-radius: var(--radius-sm); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .me-menu-icon svg { width: 18px; height: 18px; }
    .me-menu-label { margin-left: 14px; font-size: 15px; color: var(--text-primary); flex: 1; font-weight: 500; }
    .me-menu-item .chevron { color: var(--text-tertiary); }

    /* ========== SETTINGS ========== */
    .settings-window {
      position: absolute; inset: 0; z-index: 50;
      background: var(--bg-primary);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      pointer-events: none;
    }
    .settings-window.open { transform: translateX(0); pointer-events: auto; }
    .settings-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 20px; }
    .settings-content::-webkit-scrollbar { display: none; }
    .settings-group {
      margin: 10px 16px 0; background: var(--bg-card);
      border-radius: var(--radius-md); overflow: hidden;
      box-shadow: var(--shadow-soft);
    }
    .settings-item {
      display: flex; align-items: center; padding: 15px 18px;
      position: relative;
    }
    .settings-item::after {
      content: ''; position: absolute; bottom: 0; left: 18px; right: 18px;
      height: 0.5px; background: var(--divider);
    }
    .settings-item:last-child::after { display: none; }
    .settings-label { font-size: 15px; color: var(--text-primary); flex: 1; font-weight: 500; line-height: 1.4; display: inline-flex; align-items: center; }
    .settings-value { font-size: 13px; color: var(--text-tertiary); margin-right: 8px; }
    .settings-item input[type="text"], .settings-item input[type="password"] {
      flex: 1; border: none; outline: none; font-size: 14px;
      text-align: right; color: var(--text-primary);
      font-family: inherit; background: transparent;
      line-height: 1.4; padding: 0; margin: 0;
      height: 1.4em;
    }
    .settings-item input::placeholder { color: var(--text-tertiary); }
    .settings-item textarea {
      width: 100%; border: none; outline: none; font-size: 14px;
      color: var(--text-primary); font-family: inherit; resize: none;
      background: transparent; margin-top: 8px; min-height: 60px;
      line-height: 1.5; padding: 0;
    }
    .settings-btn {
      display: block; width: calc(100% - 32px); margin: 16px 16px 0;
      padding: 13px; border-radius: var(--radius-md); border: none;
      font-size: 15px; font-weight: 600; cursor: pointer;
      text-align: center; font-family: inherit;
      transition: opacity 0.15s, transform 0.15s;
    }
    .settings-btn:active { opacity: 0.85; transform: scale(0.98); }
    .settings-btn.primary {
      background: linear-gradient(135deg, var(--love), var(--love-soft));
      color: #fff; box-shadow: 0 4px 16px var(--love-glow);
    }
    .settings-btn.danger { background: var(--bg-card); color: var(--love); box-shadow: var(--shadow-soft); }

    /* ========== MODAL ========== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(45, 27, 48, 0.4);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      display: none; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-sheet {
      background: var(--bg-card);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      width: 100%; max-width: 500px; max-height: 80vh;
      overflow-y: auto; padding-bottom: var(--safe-bottom);
      overscroll-behavior: contain;
      animation: sheetUp 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: 0 -8px 40px rgba(45, 27, 48, 0.12);
    }
    @keyframes sheetUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; position: sticky; top: 0;
      background: var(--bg-card); z-index: 1;
    }
    .modal-sheet-header h3 { font-size: 17px; font-weight: 700; color: var(--text-primary); }
    .modal-sheet-close {
      background: var(--love-pale); border: none; cursor: pointer;
      color: var(--love); font-size: 22px; line-height: 1;
      width: 32px; height: 32px; display: flex; align-items: center;
      justify-content: center; border-radius: 50%;
      transition: background 0.15s;
    }
    .modal-sheet-close:active { background: var(--love-light); }
    .modal-sheet-body { padding: 4px 20px 20px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
    .form-input {
      width: 100%; height: 44px; border: 1.5px solid var(--border-color);
      border-radius: var(--radius-sm); padding: 0 14px; font-size: 15px;
      outline: none; font-family: inherit; color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--bg-warm);
    }
    .form-input:focus { border-color: var(--love-light); box-shadow: 0 0 0 3px rgba(232, 71, 95, 0.08); }
    .form-textarea { height: auto; min-height: 90px; padding: 12px 14px; resize: vertical; }
    .form-hint { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; }
    .form-btn {
      display: block; width: 100%; padding: 14px; border-radius: var(--radius-md);
      border: none; font-size: 16px; font-weight: 600; cursor: pointer;
      background: linear-gradient(135deg, var(--love), var(--love-soft));
      color: #fff; font-family: inherit;
      box-shadow: 0 4px 16px var(--love-glow);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .form-btn:active { transform: scale(0.98); box-shadow: 0 2px 8px var(--love-glow); }

    /* ========== TOAST ========== */
    .toast {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
      background: rgba(45, 27, 48, 0.85); color: #fff;
      padding: 14px 28px; border-radius: var(--radius-md);
      font-size: 14px; z-index: 999; pointer-events: none;
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    /* ========== EMPTY STATE ========== */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 32px; text-align: center;
    }
    .empty-state-icon { font-size: 56px; margin-bottom: 20px; }
    .empty-state-text { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }
    .empty-state-btn {
      margin-top: 24px; padding: 12px 32px; border-radius: 24px;
      background: linear-gradient(135deg, var(--love), var(--love-soft));
      color: #fff; border: none; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 16px var(--love-glow);
      transition: transform 0.15s;
    }
    .empty-state-btn:active { transform: scale(0.95); }

    /* ========== TYPING INDICATOR ========== */
    .typing-indicator { display: flex; gap: 5px; padding: 6px 0; }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--love-light);
      animation: typingBounce 1.4s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

              <input type="text" id="settingsAvatar" placeholder="Emoji…" maxlength="4" name="avatar" autocomplete="off" style="width:60px; text-align:center; font-size:15px;" />
            </div>

              <label class="settings-label" for="settingsNickname"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:16px;height:16px;display:inline;vertical-align:middle;margin-right:4px;" aria-hidden="true"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>昵称</label>
              <input type="text" id="settingsNickname" placeholder="输入昵称…" maxlength="20" name="nickname" autocomplete="off" />

              <label class="settings-label" for="settingsSignature"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:16px;height:16px;display:inline;vertical-align:middle;margin-right:4px;" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>个性签名</label>
              <input type="text" id="settingsSignature" placeholder="一句话介绍自己…" maxlength="60" name="signature" autocomplete="off" />
            </div>
          </div>
          <div class="settings-group">
            <div class="settings-item">
              <span class="settings-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:16px;height:16px;display:inline;vertical-align:middle;margin-right:4px;" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 16v.01"/><path d="M12 8a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V13"/></svg>调试模式</span>
              <label style="position:relative;width:48px;height:26px;display:inline-block;cursor:pointer;">
                <input type="checkbox" id="settingsDebug" aria-label="调试模式" style="opacity:0;width:0;height:0;" />
                <span id="debugTrack" style="position:absolute;inset:0;background:var(--border-color);border-radius:13px;transition:.3s;"></span>
                <span id="debugKnob" style="position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,0.15);"></span>
              </label>
            </div>
          </div>
          <button class="settings-btn danger" id="clearDataBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:16px;height:16px;display:inline;vertical-align:middle;margin-right:4px;" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>清除全部缓存</button>
          <button class="settings-btn danger" id="exportDataBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:16px;height:16px;display:inline;vertical-align:middle;margin-right:4px;" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>导出对话数据</button>
        </div>
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar" id="tabBar">
      <button class="tab-item active" data-tab="chats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="tab-label">消息</span>
        <span class="tab-badge" id="chatBadge" style="display:none;">0</span>
      </button>
      <button class="tab-item" data-tab="contacts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="tab-label">朋友</span>
      </button>
      <button class="tab-item" data-tab="discover">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        <span class="tab-label">发现</span>
      </button>
      <button class="tab-item" data-tab="me">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="tab-label">我</span>

  <!-- New Session Modal -->
  <div class="modal-overlay" id="newSessionModal">
    <div class="modal-sheet">
      <div class="modal-sheet-header">
        <h3>创建新朋友</h3>
        <button class="modal-sheet-close" id="closeNewSession">&times;</button>
      </div>
      <div class="modal-sheet-body">
        <div class="form-group">
          <label class="form-label" for="sessionNameInput">朋友名称</label>
          <input class="form-input" type="text" id="sessionNameInput" placeholder="例如：小甜、暖心姐姐…" maxlength="20" name="sessionName" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label" for="sessionEmojiInput">头像 Emoji</label>
          <input class="form-input" type="text" id="sessionEmojiInput" placeholder="💕 🌸 ✨ 🦋" maxlength="4" name="sessionEmoji" autocomplete="off" style="font-size:24px; text-align:center;" />
        </div>

          <label class="form-label" for="sessionPromptInput">性格设定 (System Prompt)</label>
          <textarea class="form-input form-textarea" id="sessionPromptInput" placeholder="描述 TA 的性格、说话风格…&#10;例如：你是一个温柔体贴的恋人，说话甜美可爱…" name="sessionPrompt"></textarea>
          <p class="form-hint">定义 AI 的性格、说话风格和行为方式</p>

  <!-- Post Moment Modal -->
  <div class="modal-overlay" id="postMomentModal">
    <div class="modal-sheet">

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal-sheet" style="border-radius: var(--radius-lg) var(--radius-lg) 0 0; max-width: 340px; margin: 0 auto;">
      <div class="modal-sheet-body" style="padding: 28px 24px 20px; text-align: center;">
        <svg viewBox="0 0 48 48" width="48" height="48" fill="none" stroke="var(--love)" stroke-width="2" style="margin-bottom: 16px;"><circle cx="24" cy="24" r="20"/><path d="M24 16v10" stroke-linecap="round"/><circle cx="24" cy="32" r="1.5" fill="var(--love)"/></svg>
        <h3 style="font-size: 17px; font-weight: 600; margin-bottom: 8px;">删除会话</h3>
        <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6;">确定要删除这个会话吗？<br/>删除后无法恢复。</p>
        <div style="display: flex; gap: 12px;">
          <button id="deleteCancelBtn" style="flex: 1; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); background: var(--bg-warm); color: var(--text-primary); font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.15s;">取消</button>
          <button id="deleteConfirmBtn" style="flex: 1; padding: 12px; border-radius: var(--radius-sm); border: none; background: var(--love); color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.15s;">删除</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions";
    const $ = id => document.getElementById(id);

    // ==================== STATE ====================
    let sessions = JSON.parse(localStorage.getItem("chatSessions") || "[]");
    sessions.forEach(s => { if (s.messages.length > 0) { const last = s.messages[s.messages.length - 1]; if (last.role === "assistant" && !last.content) s.messages.pop(); } });
    let activeSessionId = localStorage.getItem("activeSessionId") || null;
    let isStreaming = false, currentChatId = null;

    function encodeKey(k) { return btoa(encodeURIComponent(k)); }
    function decodeKey(k) { try { return decodeURIComponent(atob(k)); } catch(e) { return k; } }
    let apiKey = decodeKey(localStorage.getItem("deepseekApiKey") || "") || localStorage.getItem("deepseekApiKey") || "";
    let debugMode = localStorage.getItem("debugMode") === "true";

    let userProfile = JSON.parse(localStorage.getItem("userProfile") || "{}");
    if (!userProfile.avatar) userProfile.avatar = localStorage.getItem("userAvatar") || "💕";
    if (!userProfile.nickname) userProfile.nickname = "用户昵称";
    if (!userProfile.signature) userProfile.signature = "点击设置个性签名";

    let moments = JSON.parse(localStorage.getItem("moments") || "[]");
    let currentTheme = localStorage.getItem("theme_v2") || "default";

    // ==================== SAVE ====================
    function saveSessions() { const c = sessions.map(s => { const msgs = s.messages.map(m => { const { _debug, ...rest } = m; return rest; }); return { ...s, messages: msgs }; }); localStorage.setItem("chatSessions", JSON.stringify(c)); localStorage.setItem("activeSessionId", activeSessionId); }
    function saveProfile() { localStorage.setItem("userProfile", JSON.stringify(userProfile)); }
    function saveMoments() { localStorage.setItem("moments", JSON.stringify(moments)); }
    function saveApiKey() { localStorage.setItem("deepseekApiKey", encodeKey(apiKey)); }
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

    // ==================== TOAST ====================
    function showToast(msg, dur = 1500) { const t = $("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), dur); }

    // ==================== FLOATING HEARTS ====================
    function createHearts() {
      const bg = $("heartsBg");
      for (let i = 0; i < 12; i++) {
        const h = document.createElement("div");
        h.className = "floating-heart";
        h.style.left = Math.random() * 100 + "%";
        h.style.animationDuration = 12 + Math.random() * 18 + "s";
        h.style.animationDelay = Math.random() * 15 + "s";
        const size = 6 + Math.random() * 8;
        h.style.width = size + "px"; h.style.height = size + "px";
        bg.appendChild(h);
      }
    }

    // ==================== HEADER STARS ====================
    function createStars() {
      const c = $("headerStars");
      for (let i = 0; i < 30; i++) {
        const s = document.createElement("div");
        s.className = "header-star";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = Math.random() * 100 + "%";
        s.style.animationDelay = Math.random() * 3 + "s";
        s.style.animationDuration = 2 + Math.random() * 3 + "s";
        s.style.width = s.style.height = (1 + Math.random() * 2) + "px";
        c.appendChild(s);
      }
    }

    // ==================== THEME ====================
    function applyTheme(theme) {
      currentTheme = theme; localStorage.setItem("theme_v2", theme);
      if (theme === "default") document.documentElement.removeAttribute("data-theme");
      else document.documentElement.setAttribute("data-theme", theme);
      document.querySelectorAll(".theme-pick").forEach(btn => {
        const isActive = btn.dataset.theme === theme;
        btn.classList.toggle("active", isActive);
        // Reset inline styles so CSS theme rules take effect
        btn.style.borderColor = "";
        btn.style.background = "";
      });
    }

    // ==================== TAB NAV ====================
    const tabMap = { chats: "pageChats", contacts: "pageContacts", discover: "pageDiscover", me: "pageMe" };
    const headerTitles = { chats: "LoveChat", contacts: "我的朋友", discover: "发现", me: "我" };
    function switchTab(tab) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.querySelectorAll(".tab-item").forEach(t => t.classList.remove("active"));
      $(tabMap[tab]).classList.add("active");
      document.querySelector(`.tab-item[data-tab="${tab}"]`).classList.add("active");
      $("headerTitle").textContent = headerTitles[tab];
      $("mainHeader").style.display = ""; $("tabBar").style.display = "";
      if (tab === "chats") renderChatList(); if (tab === "contacts") renderContacts();
      if (tab === "discover") renderMoments(); if (tab === "me") renderMe();
    }
    document.querySelectorAll(".tab-item").forEach(btn => btn.addEventListener("click", () => switchTab(btn.dataset.tab)));

    // ==================== CHAT LIST ====================
    function renderChatList() {
      const list = $("chatList");
      if (!sessions.length) {
        list.innerHTML = `<div class="empty-state"><div class="empty-state-icon" style="opacity:0.4;"><svg viewBox="0 0 48 48" width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L24 33.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke="var(--love)" fill="var(--love-pale)"/></svg></div><div class="empty-state-text">还没有心动对话<br/>点击右上角 + 开启你的第一段缘分</div><button class="empty-state-btn" id="emptyCreateBtn">遇见 TA</button></div>`;
        $("chatBadge").style.display = "none";
        document.getElementById("emptyCreateBtn")?.addEventListener("click", openNewSessionModal);
        return;
      }
      const avatarGradients = [
        "var(--avatar-grad-1)","var(--avatar-grad-2)",
        "var(--avatar-grad-3)","var(--avatar-grad-4)",
        "var(--avatar-grad-5)","var(--avatar-grad-6)"
      ];
      list.innerHTML = sessions.map((s, i) => {
        const last = s.messages.length > 0 ? s.messages[s.messages.length - 1] : null;
        const preview = last ? (last.content || "").slice(0, 30) : "开始心动吧...";
        const time = last ? formatTime(last.timestamp) : "";
        const unread = s.unread || 0;
        const emoji = s.emoji || "💕";
        const bg = avatarGradients[i % avatarGradients.length];
        return `<button class="chat-item" data-id="${s.id}"><div style="display:flex;align-items:center;"><div class="chat-avatar" style="background:${bg}">${emoji}</div><div class="chat-info"><div class="chat-info-top"><span class="chat-name">${esc(s.name)}</span><span class="chat-time">${time}</span></div><div style="display:flex;justify-content:space-between;align-items:center;"><span class="chat-preview">${esc(preview)}</span>${unread > 0 ? `<span class="chat-badge">${unread}</span>` : ""}</div></div></div></button>`;
      }).join("");
      const total = sessions.reduce((s, x) => s + (x.unread || 0), 0);
      const badge = $("chatBadge");
      if (total > 0) { badge.textContent = total > 99 ? "99+" : total; badge.style.display = ""; } else badge.style.display = "none";
      list.querySelectorAll(".chat-item").forEach(item => item.addEventListener("click", () => openChat(item.dataset.id)));
    }

    function formatTime(ts) {
      if (!ts) return ""; const d = new Date(ts), now = new Date(), diff = now - d;
      if (diff < 60000) return "刚刚"; if (diff < 3600000) return Math.floor(diff / 60000) + "分钟前";
      if (d.toDateString() === now.toDateString()) return new Intl.DateTimeFormat("zh-CN", { hour: "2-digit", minute: "2-digit" }).format(d);
      const y = new Date(now); y.setDate(y.getDate() - 1); if (d.toDateString() === y.toDateString()) return "昨天";
      return new Intl.DateTimeFormat("zh-CN", { month: "numeric", day: "numeric" }).format(d);
    }
    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

    // ==================== CHAT WINDOW ====================
    function openChat(id) {
      const s = sessions.find(x => x.id === id); if (!s) return;
      currentChatId = id; s.unread = 0; saveSessions(); activeSessionId = id;
      $("chatWindowTitle").textContent = s.name; renderMessages(s);
      $("chatWindow").classList.add("open"); $("mainHeader").style.display = "none"; $("tabBar").style.display = "none";
      setTimeout(() => { $("chatMessages").scrollTop = $("chatMessages").scrollHeight; }, 50);
    }
    function closeChat() { $("chatWindow").classList.remove("open"); $("mainHeader").style.display = ""; $("tabBar").style.display = ""; currentChatId = null; renderChatList(); }

    function renderMessages(session) {
      const c = $("chatMessages");
      const si = sessions.findIndex(s => s.id === session.id);
      if (!session.messages.length) {
        c.innerHTML = `<div class="empty-state" style="padding:40px 20px;"><div style="font-size:56px;margin-bottom:12px;">${session.emoji || "💕"}</div><div class="empty-state-text">${esc(session.name)}</div><div style="font-size:13px;color:var(--text-tertiary);margin-top:6px;">${esc(session.prompt || "开始心动吧...")}</div></div>`; return;
      }
      let html = "", lastT = 0;
      session.messages.forEach(m => {
        if (m.timestamp && m.timestamp - lastT > 300000) { html += `<div class="msg-time-label">${formatTime(m.timestamp)}</div>`; lastT = m.timestamp; }
        if (m.role === "user") {
          html += `<div class="msg-row user"><div class="msg-avatar" style="background:var(--avatar-grad-1);">${userProfile.avatar || "💕"}</div><div class="msg-bubble">${esc(m.content)}</div></div>`;
        } else {
          const bg = avatarGradients[Math.max(0, si) % avatarGradients.length];
          html += `<div class="msg-row ai"><div class="msg-avatar" style="background:${bg};">${session.emoji || "💕"}</div><div class="msg-bubble">${(esc(m.content) || "").replace(/\n/g, "<br>")}</div></div>`;
        }
      });
      c.innerHTML = html;
    }

    // ==================== SEND ====================
    async function sendMessage() {
      const input = $("chatInput"), text = input.value.trim();
      if (!text || isStreaming || !currentChatId) return;
      const s = sessions.find(x => x.id === currentChatId); if (!s) return;
      s.messages.push({ role: "user", content: text, timestamp: Date.now() });
      input.value = ""; input.style.height = "auto"; updateSendBtn(); renderMessages(s); scrollBottom();
      if (!apiKey) { s.messages.push({ role: "assistant", content: "请先在设置中配置 API Key", timestamp: Date.now() }); saveSessions(); renderMessages(s); scrollBottom(); return; }
      isStreaming = true;
      const si = sessions.findIndex(x => x.id === s.id);
      const typingBg = avatarGradients[Math.max(0, si) % avatarGradients.length];
      const typingHtml = `<div class="msg-row ai" id="typingRow"><div class="msg-avatar" style="background:${typingBg}">${s.emoji || "💕"}</div><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
      $("chatMessages").insertAdjacentHTML("beforeend", typingHtml); scrollBottom();
      try {
        const apiMsgs = [{ role: "system", content: s.prompt || "你是一个友好的AI助手。" }, ...s.messages.map(m => ({ role: m.role, content: m.content }))];
        const resp = await fetch(DEEPSEEK_API_URL, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` }, body: JSON.stringify({ model: "deepseek-chat", messages: apiMsgs, stream: true }) });
        if (!resp.ok) throw new Error(`API Error: ${resp.status}`);
        const tr = $("typingRow"); if (tr) tr.remove();
        s.messages.push({ role: "assistant", content: "", timestamp: Date.now() }); const mi = s.messages.length - 1;
        const reader = resp.body.getReader(), decoder = new TextDecoder(); let buf = "";
        while (true) { const { done, value } = await reader.read(); if (done) break; buf += decoder.decode(value, { stream: true }); const lines = buf.split("\n"); buf = lines.pop() || "";
          for (const line of lines) { if (line.startsWith("data: ")) { const data = line.slice(6).trim(); if (data === "[DONE]") continue; try { const j = JSON.parse(data); const d = j.choices?.[0]?.delta?.content || ""; if (d) { s.messages[mi].content += d; const bubs = $("chatMessages").querySelectorAll(".msg-row.ai .msg-bubble"); const lb = bubs[bubs.length - 1]; if (lb) lb.innerHTML = (esc(s.messages[mi].content) || "").replace(/\n/g, "<br>"); scrollBottom(); } } catch(e) {} } } }
      } catch (err) { const tr = $("typingRow"); if (tr) tr.remove(); s.messages.push({ role: "assistant", content: `❌ ${err.message}`, timestamp: Date.now() }); }
      isStreaming = false; saveSessions(); renderMessages(s); scrollBottom();
    }
    function scrollBottom() { setTimeout(() => { const m = $("chatMessages"); m.scrollTop = m.scrollHeight; }, 30); }
    function updateSendBtn() { $("chatSendBtn").classList.toggle("disabled", !$("chatInput").value.trim().length); }

    // ==================== CONTACTS ====================
    function renderContacts() {
      const list = $("contactList");
      if (!sessions.length) { list.innerHTML = `<div class="empty-state" style="padding:40px 20px;"><div class="empty-state-icon" style="opacity:0.4;"><svg viewBox="0 0 48 48" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M40 21v-2a4 4 0 0 0-4-4H12a4 4 0 0 0-4 4v2" stroke="var(--love)"/><circle cx="24" cy="14" r="6" stroke="var(--love)" fill="var(--love-pale)"/></svg></div><div class="empty-state-text">还没有朋友<br/>去创建一个吧</div></div>`; return; }
      const grads = ["var(--avatar-grad-1)","var(--avatar-grad-2)","var(--avatar-grad-3)","var(--avatar-grad-4)","var(--avatar-grad-5)","var(--avatar-grad-6)"];
      list.innerHTML = sessions.map((s, i) => `<button class="contact-item" data-id="${s.id}"><div class="contact-avatar" style="background:${grads[i % grads.length]}">${s.emoji || "💕"}</div><span class="contact-name">${esc(s.name)}</span><span class="chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></span></button>`).join("");
      list.querySelectorAll(".contact-item").forEach(item => item.addEventListener("click", () => openChat(item.dataset.id)));
    }

    // ==================== MOMENTS ====================
    function renderMoments() {
      $("momentsAvatar").textContent = userProfile.avatar || "💕";
      $("momentsUserName").textContent = userProfile.nickname || "用户昵称";
      $("momentsSignature").textContent = userProfile.signature || "";
      const feed = $("momentsFeed");
      if (!moments.length) { feed.innerHTML = `<div class="empty-state" style="padding:50px 20px;"><div class="empty-state-icon" style="opacity:0.4;"><svg viewBox="0 0 48 48" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="24" cy="24" r="16" stroke="var(--love)" fill="var(--love-pale)"/><path d="M24 16v8l4 4" stroke="var(--love)" stroke-linecap="round"/></svg></div><div class="empty-state-text">还没有动态<br/>点击右上角相机分享你的心情</div></div>`; return; }
      const gradients = ["linear-gradient(135deg,#FFF0F3,#FFE0E8)","linear-gradient(135deg,#E8DFF0,#DDD6FE)","linear-gradient(135deg,#FEF3C7,#FDE68A)","linear-gradient(135deg,#DBEAFE,#BFDBFE)","linear-gradient(135deg,#D1FAE5,#A7F3D0)","linear-gradient(135deg,#FCE7F3,#FBCFE8)","linear-gradient(135deg,#E0E7FF,#C7D2FE)","linear-gradient(135deg,#FEE2E2,#FECACA)","linear-gradient(135deg,#F3E8FF,#E9D5FF)"];
        feed.innerHTML = moments.sort((a, b) => b.timestamp - a.timestamp).map(m => {
        const imgHtml = m.images?.length ? `<div class="moment-images cols-${m.images.length <= 1 ? 1 : m.images.length <= 4 ? 2 : 3}">${m.images.map((_, i) => `<div class="moment-img"><div class="moment-img-placeholder" style="background:${gradients[i%9]}"></div></div>`).join("")}</div>` : "";
        return `<div class="moment-post"><div class="moment-post-header"><div class="moment-avatar" style="background:var(--avatar-grad-1);">${userProfile.avatar || "💕"}</div><div class="moment-content"><div class="moment-name">${esc(userProfile.nickname || "用户昵称")}</div>${m.text ? `<div class="moment-text">${esc(m.text)}</div>` : ""}${imgHtml}<div class="moment-footer"><span style="font-size:11px;color:var(--text-tertiary);margin-right:auto;">${formatTime(m.timestamp)}</span><button class="moment-action ${m.liked?'liked':''}" data-id="${m.id}" data-action="like"><svg viewBox="0 0 24 24" fill="${m.liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${m.likeCount > 0 ? m.likeCount : ''}</button><button class="moment-action" data-id="${m.id}" data-action="comment"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button></div></div></div></div>`;
      }).join("");
      feed.querySelectorAll(".moment-action[data-action='like']").forEach(btn => btn.addEventListener("click", () => { const m = moments.find(x => x.id === btn.dataset.id); if (m) { m.liked = !m.liked; m.likeCount = (m.likeCount || 0) + (m.liked ? 1 : -1); saveMoments(); renderMoments(); } }));
    }

    // ==================== ME ====================
    function renderMe() { $("meAvatar").textContent = userProfile.avatar || "💕"; $("meName").textContent = userProfile.nickname || "用户昵称"; }

    // ==================== SETTINGS ====================
    function openSettings() {
      $("settingsApiKey").value = apiKey; $("settingsAvatar").value = userProfile.avatar || "💕";
      $("settingsNickname").value = userProfile.nickname || ""; $("settingsSignature").value = userProfile.signature || "";
      $("settingsDebug").checked = debugMode; updateDebugToggle(); applyTheme(currentTheme);
      $("settingsWindow").classList.add("open"); $("mainHeader").style.display = "none"; $("tabBar").style.display = "none";
    }
    function closeSettings() {
      const k = $("settingsApiKey").value.trim(); if (k) { apiKey = k; saveApiKey(); }
      userProfile.avatar = $("settingsAvatar").value || "💕"; userProfile.nickname = $("settingsNickname").value || "用户昵称";
      userProfile.signature = $("settingsSignature").value || ""; debugMode = $("settingsDebug").checked;
      localStorage.setItem("debugMode", debugMode); saveProfile();
      $("settingsWindow").classList.remove("open"); $("mainHeader").style.display = ""; $("tabBar").style.display = "";
      renderMe(); renderMoments(); renderChatList();
    }
    function updateDebugToggle() { const c = $("settingsDebug").checked; $("debugTrack").style.background = c ? "var(--love)" : "var(--border-color)"; $("debugKnob").style.transform = c ? "translateX(22px)" : "translateX(0)"; }

    // ==================== NEW SESSION ====================
    function openNewSessionModal() { $("newSessionModal").classList.add("show"); }
    function closeNewSessionModal() { $("newSessionModal").classList.remove("show"); $("sessionNameInput").value = ""; $("sessionEmojiInput").value = ""; $("sessionPromptInput").value = ""; }
    function createSession() {
      const name = $("sessionNameInput").value.trim(), emoji = $("sessionEmojiInput").value.trim() || "💕", prompt = $("sessionPromptInput").value.trim();
      if (!name) { showToast("请输入朋友名称"); return; }
      sessions.unshift({ id: generateId(), name, emoji, prompt, messages: [], unread: 0, createdAt: Date.now() });
      saveSessions(); closeNewSessionModal(); renderChatList(); renderContacts(); showToast("创建成功");
    }

    // ==================== POST MOMENT ====================
    function openPostMoment() { $("postMomentModal").classList.add("show"); }
    function closePostMoment() { $("postMomentModal").classList.remove("show"); $("momentTextInput").value = ""; }
    function publishMoment() {
      const text = $("momentTextInput").value.trim(); if (!text) { showToast("写点什么吧~"); return; }
      moments.push({ id: generateId(), text, images: [], timestamp: Date.now(), liked: false, likeCount: 0 });
      saveMoments(); closePostMoment(); renderMoments(); showToast("发布成功");
    }

    // ==================== EVENTS ====================
    $("chatBackBtn").addEventListener("click", closeChat);
    $("chatMoreBtn").addEventListener("click", () => { $("deleteModal").classList.add("show"); });
    $("deleteCancelBtn").addEventListener("click", () => { $("deleteModal").classList.remove("show"); });
    $("deleteConfirmBtn").addEventListener("click", () => {
      $("deleteModal").classList.remove("show");
      if (!currentChatId) return;
      sessions = sessions.filter(s => s.id !== currentChatId);
      if (activeSessionId === currentChatId) activeSessionId = null;
      saveSessions();
      closeChat();
      renderChatList();
      renderContacts();
      showToast("已删除");
    });
    $("chatSendBtn").addEventListener("click", sendMessage);
    $("chatInput").addEventListener("input", () => { updateSendBtn(); const t = $("chatInput"); t.style.height = "auto"; t.style.height = Math.min(t.scrollHeight, 100) + "px"; });
    $("chatInput").addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    $("addBtn").addEventListener("click", openNewSessionModal);
    $("closeNewSession").addEventListener("click", closeNewSessionModal);
    $("createSessionBtn").addEventListener("click", createSession);
    $("menuSettings").addEventListener("click", openSettings);
    $("settingsBackBtn").addEventListener("click", closeSettings);
    document.querySelectorAll(".theme-pick").forEach(btn => btn.addEventListener("click", () => applyTheme(btn.dataset.theme)));
    $("settingsDebug").addEventListener("change", updateDebugToggle);
    $("clearDataBtn").addEventListener("click", () => { if (confirm("确定清除全部缓存？")) { localStorage.clear(); sessions = []; moments = []; userProfile = { avatar: "💕", nickname: "用户昵称", signature: "" }; apiKey = ""; saveProfile(); renderChatList(); renderContacts(); renderMoments(); renderMe(); showToast("已清除"); } });
    $("exportDataBtn").addEventListener("click", () => { const d = { sessions, moments, userProfile, exportedAt: new Date().toISOString() }; const b = new Blob([JSON.stringify(d, null, 2)], { type: "application/json" }); const u = URL.createObjectURL(b); const a = document.createElement("a"); a.href = u; a.download = `lovechat-${Date.now()}.json`; a.click(); URL.revokeObjectURL(u); showToast("导出成功"); });
    $("postMomentBtn").addEventListener("click", openPostMoment);
    $("closePostMoment").addEventListener("click", closePostMoment);
    $("publishMomentBtn").addEventListener("click", publishMoment);
    $("menuMoments").addEventListener("click", () => switchTab("discover"));
    $("menuFavorites").addEventListener("click", () => showToast("收藏功能开发中"));
    $("menuServices").addEventListener("click", () => showToast("恋爱助手开发中"));
    $("menuCards").addEventListener("click", () => showToast("卡包功能开发中"));
    $("menuStickers").addEventListener("click", () => showToast("表情功能开发中"));
    $("meProfileSection").addEventListener("click", openSettings);
    $("searchBtn").addEventListener("click", () => showToast("搜索功能开发中"));
    document.querySelectorAll(".modal-overlay").forEach(o => o.addEventListener("click", e => { if (e.target === o) o.classList.remove("show"); }));

    // ==================== INIT ====================
    createHearts(); createStars(); applyTheme(currentTheme);
    renderChatList(); renderContacts(); renderMoments(); renderMe();
  </script>
</body>
</html>
