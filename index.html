<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AI Chat" />
    <meta name="theme-color" content="#FFF0F5" />
    <title>AI Chat</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --pink-50: #fff0f5;
        --pink-100: #ffe4ef;
        --pink-200: #ffcce0;
        --pink-300: #ffb3d1;
        --pink-400: #ff8cb8;
        --pink-500: #ff6b9d;
        --pink-600: #ff4d8a;
        --bg-primary: #fff5f8;
        --bg-secondary: #ffffff;
        --text-primary: #2d2d3a;
        --text-secondary: #9999aa;
        --border-color: #ffe4ef;
        --input-bg: #ffffff;
        --header-bg: rgba(255, 245, 248, 0.92);
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --chat-padding-bottom: calc(70px + var(--safe-bottom));
        --shadow-bubble: 0 2px 8px rgba(255, 107, 157, 0.1);
        --sidebar-width: 280px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-primary: #1a1520;
          --bg-secondary: #252030;
          --text-primary: #f0e8f5;
          --text-secondary: #8a8095;
          --border-color: #3a3045;
          --input-bg: #252030;
          --header-bg: rgba(26, 21, 32, 0.92);
          --shadow-bubble: 0 2px 8px rgba(0, 0, 0, 0.15);
        }
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
      }

      /* ==================== 浪漫背景 ==================== */
      .romantic-bg {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .floating-heart {
        position: absolute;
        font-size: 16px;
        opacity: 0;
        animation: floatHeart linear infinite;
      }
      @keyframes floatHeart {
        0% {
          opacity: 0;
          transform: translateY(100vh) rotate(0deg) scale(0.5);
        }
        10% {
          opacity: 0.5;
        }
        90% {
          opacity: 0.2;
        }
        100% {
          opacity: 0;
          transform: translateY(-10vh) rotate(360deg) scale(1);
        }
      }

      /* ==================== 侧边栏 ==================== */
      .sidebar-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.3);
        z-index: 150;
        display: none;
        animation: fadeIn 0.2s;
      }
      .sidebar-overlay.show {
        display: block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: var(--sidebar-width);
        max-width: 80vw;
        background: var(--bg-primary);
        z-index: 200;
        display: flex;
        flex-direction: column;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border-right: 0.5px solid var(--border-color);
      }
      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-header {
        padding: calc(var(--safe-top) + 12px) 16px 12px;
        border-bottom: 0.5px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .sidebar-header h3 {
        font-size: 18px;
        font-weight: 700;
      }
      .sidebar-close {
        background: none;
        border: none;
        font-size: 22px;
        cursor: pointer;
        color: var(--text-secondary);
        padding: 4px;
      }

      .new-chat-btn {
        margin: 12px 16px;
        padding: 12px;
        border-radius: 14px;
        background: linear-gradient(135deg, #ff6b9d 0%, #ff8cb8 100%);
        color: white;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        box-shadow: 0 2px 10px rgba(255, 107, 157, 0.3);
        transition:
          transform 0.15s,
          opacity 0.15s;
      }
      .new-chat-btn:active {
        transform: scale(0.96);
        opacity: 0.85;
      }

      .session-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 8px;
      }
      .session-list::-webkit-scrollbar {
        display: none;
      }

      .session-item {
        display: flex;
        align-items: center;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.15s;
        margin-bottom: 2px;
        position: relative;
      }
      .session-item:hover {
        background: var(--pink-100);
      }
      .session-item.active {
        background: var(--pink-100);
      }
      @media (prefers-color-scheme: dark) {
        .session-item:hover,
        .session-item.active {
          background: rgba(255, 107, 157, 0.12);
        }
      }

      .session-item .session-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        background: linear-gradient(135deg, #ffd700, #ffa500);
      }
      .session-item .session-info {
        flex: 1;
        margin-left: 10px;
        min-width: 0;
      }
      .session-item .session-name {
        font-size: 15px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .session-item .session-preview {
        font-size: 12px;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
      }
      .session-item .session-delete {
        background: none;
        border: none;
        font-size: 16px;
        cursor: pointer;
        color: var(--text-secondary);
        padding: 4px 6px;
        border-radius: 8px;
        opacity: 0;
        transition: opacity 0.15s;
        flex-shrink: 0;
      }
      .session-item:hover .session-delete {
        opacity: 1;
      }
      .session-item .session-delete:active {
        color: #ff3b30;
      }

      /* ==================== App Layout ==================== */
      .app {
        display: flex;
        flex-direction: column;
        height: 100%;
        max-width: 480px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }

      /* ==================== Header ==================== */
      .header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--header-bg);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 0.5px solid var(--border-color);
        padding-top: var(--safe-top);
      }
      .header-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        min-height: 44px;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .menu-btn {
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        padding: 4px;
        color: var(--text-primary);
      }
      .header-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        box-shadow: 0 2px 8px rgba(255, 165, 0, 0.3);
      }
      .header-info {
        display: flex;
        flex-direction: column;
      }
      .header-name {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.2;
      }
      .mood-badge {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        font-size: 11px;
        color: var(--pink-500);
        background: var(--pink-100);
        padding: 1px 8px;
        border-radius: 10px;
        margin-top: 2px;
      }
      @media (prefers-color-scheme: dark) {
        .mood-badge {
          background: rgba(255, 107, 157, 0.15);
        }
      }
      .header-btn {
        background: none;
        border: none;
        color: var(--text-secondary);
        font-size: 20px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 50%;
      }

      /* ==================== Chat ==================== */
      .chat-container {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 16px 16px var(--chat-padding-bottom);
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
      }
      .chat-container::-webkit-scrollbar {
        display: none;
      }

      .message-group {
        margin-bottom: 12px;
        animation: messageIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes messageIn {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .message-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        max-width: 82%;
      }
      .message-row.user {
        margin-left: auto;
        flex-direction: row-reverse;
      }
      .message-row.bot {
        margin-right: auto;
      }

      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }
      .avatar.bot-avatar {
        background: linear-gradient(135deg, #ffd700, #ffa500);
        box-shadow: 0 2px 8px rgba(255, 165, 0, 0.25);
      }
      .avatar.user-avatar {
        background: linear-gradient(135deg, #b8a9ff, #8b7fe8);
        box-shadow: 0 2px 8px rgba(139, 127, 232, 0.25);
      }

      .bubble {
        padding: 10px 14px;
        border-radius: 20px;
        font-size: 15px;
        line-height: 1.55;
        word-break: break-word;
      }
      .bubble.user-bubble {
        background: linear-gradient(135deg, #ff6b9d, #ff8cb8, #ffb3d1);
        color: white;
        border-bottom-right-radius: 6px;
        box-shadow: var(--shadow-bubble);
      }
      .bubble.bot-bubble {
        background: var(--bg-secondary);
        color: var(--text-primary);
        border-bottom-left-radius: 6px;
        box-shadow: var(--shadow-bubble);
      }

      .time-wrapper {
        text-align: center;
        margin: 8px 0;
      }
      .message-time {
        font-size: 11px;
        color: var(--text-secondary);
        background: var(--bg-secondary);
        padding: 2px 10px;
        border-radius: 10px;
        display: inline-block;
      }

      .typing-indicator {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 4px 0;
      }
      .typing-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--pink-400);
        animation: typingBounce 1.4s infinite ease-in-out;
      }
      .typing-dot:nth-child(1) {
        animation-delay: 0s;
      }
      .typing-dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes typingBounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.3;
        }
        30% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }

      /* ==================== Input Bar ==================== */
      .input-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--header-bg);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-top: 0.5px solid var(--border-color);
        padding: 8px 16px;
        padding-bottom: calc(8px + var(--safe-bottom));
        z-index: 100;
      }
      .input-bar-inner {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        max-width: 480px;
        margin: 0 auto;
      }
      .input-wrapper {
        flex: 1;
        background: var(--input-bg);
        border: 1.5px solid var(--border-color);
        border-radius: 22px;
        padding: 8px 16px;
        display: flex;
        align-items: flex-end;
        min-height: 38px;
        max-height: 120px;
        transition: border-color 0.2s;
      }
      .input-wrapper:focus-within {
        border-color: var(--pink-400);
      }
      .input-wrapper textarea {
        width: 100%;
        border: none;
        outline: none;
        background: transparent;
        font-size: 15px;
        line-height: 1.4;
        resize: none;
        color: var(--text-primary);
        font-family: inherit;
        max-height: 100px;
      }
      .input-wrapper textarea::placeholder {
        color: var(--text-secondary);
      }
      .send-btn {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(135deg, #ff6b9d, #ff8cb8);
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition:
          transform 0.15s,
          opacity 0.15s;
        opacity: 0.4;
        box-shadow: 0 2px 8px rgba(255, 107, 157, 0.3);
      }
      .send-btn.active {
        opacity: 1;
      }
      .send-btn:active {
        transform: scale(0.88);
      }
      .send-btn svg {
        width: 18px;
        height: 18px;
      }

      /* ==================== Welcome ==================== */
      .welcome {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        text-align: center;
        flex: 1;
      }
      .welcome-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 38px;
        margin-bottom: 16px;
        box-shadow: 0 4px 20px rgba(255, 165, 0, 0.3);
        animation: avatarPulse 3s ease-in-out infinite;
      }
      @keyframes avatarPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }
      .welcome h2 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 4px;
        background: linear-gradient(135deg, #ff6b9d, #ff8cb8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .welcome .subtitle {
        font-size: 14px;
        color: var(--text-secondary);
        line-height: 1.5;
      }
      .welcome .greeting-text {
        font-size: 15px;
        color: var(--pink-500);
        margin-top: 10px;
        padding: 8px 16px;
        background: var(--pink-100);
        border-radius: 16px;
        animation: fadeInUp 0.6s ease-out 0.3s both;
      }
      @media (prefers-color-scheme: dark) {
        .welcome .greeting-text {
          background: rgba(255, 107, 157, 0.12);
        }
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ==================== Modal ==================== */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.35);
        z-index: 300;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal-overlay.show {
        display: flex;
      }
      .modal {
        background: var(--bg-primary);
        border-radius: 20px;
        width: 100%;
        max-width: 420px;
        max-height: 85vh;
        overflow-y: auto;
        padding-bottom: var(--safe-bottom);
        animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes modalIn {
        from {
          opacity: 0;
          transform: scale(0.9) translateY(20px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 20px 0;
      }
      .modal-header h3 {
        font-size: 18px;
        font-weight: 700;
      }
      .modal-close {
        background: none;
        border: none;
        color: var(--pink-500);
        font-size: 16px;
        cursor: pointer;
        padding: 4px 8px;
        font-weight: 500;
      }
      .modal-body {
        padding: 16px 20px 20px;
      }

      .form-group {
        margin-bottom: 16px;
      }
      .form-label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--text-primary);
      }
      .form-input {
        width: 100%;
        background: var(--bg-secondary);
        border: 1.5px solid var(--border-color);
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 15px;
        color: var(--text-primary);
        outline: none;
        font-family: inherit;
        transition: border-color 0.2s;
      }
      .form-input:focus {
        border-color: var(--pink-400);
      }
      .form-textarea {
        min-height: 120px;
        resize: vertical;
        line-height: 1.5;
      }
      .form-hint {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 4px;
      }

      .btn-primary {
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        border: none;
        background: linear-gradient(135deg, #ff6b9d, #ff8cb8);
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.15s,
          opacity 0.15s;
      }
      .btn-primary:active {
        transform: scale(0.97);
        opacity: 0.85;
      }
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .btn-danger {
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        border: none;
        background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
        color: white;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        margin-top: 12px;
        transition: opacity 0.15s;
      }
      .btn-danger:active {
        opacity: 0.7;
      }

      /* ==================== Error Banner ==================== */
      .error-banner {
        background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
        color: white;
        text-align: center;
        padding: 8px 16px;
        font-size: 13px;
        display: none;
        animation: slideDown 0.3s ease-out;
        z-index: 101;
      }
      @keyframes slideDown {
        from {
          transform: translateY(-100%);
        }
        to {
          transform: translateY(0);
        }
      }

      /* ==================== Status ==================== */
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        display: inline-block;
      }
      .status-dot.connected {
        background: #34c759;
      }
      .status-dot.disconnected {
        background: #ff3b30;
      }
      .status-dot.connecting {
        background: #ff9500;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      /* ==================== Love Effects ==================== */
      .love-effect {
        position: fixed;
        pointer-events: none;
        z-index: 400;
        font-size: 24px;
        animation: loveFloat 1.5s ease-out forwards;
      }
      @keyframes loveFloat {
        0% {
          opacity: 1;
          transform: translateY(0) scale(0.5);
        }
        50% {
          opacity: 0.8;
          transform: translateY(-40px) scale(1.2);
        }
        100% {
          opacity: 0;
          transform: translateY(-80px) scale(0.8);
        }
      }

      /* ==================== Empty State ==================== */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        padding: 40px;
        text-align: center;
      }
      .empty-state .empty-icon {
        font-size: 48px;
        margin-bottom: 16px;
      }
      .empty-state p {
        color: var(--text-secondary);
        font-size: 15px;
        line-height: 1.5;
      }
      .empty-state .empty-btn {
        margin-top: 16px;
        padding: 10px 24px;
        border-radius: 14px;
        background: linear-gradient(135deg, #ff6b9d, #ff8cb8);
        color: white;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }

      @media (min-width: 481px) {
        .message-row {
          max-width: 70%;
        }
      }

      /* ==================== 特殊消息样式 ==================== */
      /* 转账卡片 - 已收款 */
      .transfer-card {
        background: linear-gradient(135deg, #fff9e6, #fff3cc);
        border: 1px solid #ffd700;
        border-radius: 12px;
        padding: 12px 16px;
        margin: 8px 0;
        text-align: center;
        max-width: 220px;
      }
      @media (prefers-color-scheme: dark) {
        .transfer-card {
          background: linear-gradient(135deg, #2a2518, #332e1f);
          border-color: #8b7d3c;
        }
      }
      .transfer-card .transfer-icon {
        font-size: 28px;
        margin-bottom: 4px;
      }
      .transfer-card .transfer-amount {
        font-size: 20px;
        font-weight: 700;

    </style>
  </head>
  <body>
    <div class="romantic-bg" id="romanticBg"></div>

    <!-- 侧边栏遮罩 -->

    <script>
      // ==================== 配置 ====================
      const DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions";

      // ==================== 会话数据 ====================
      let sessions = JSON.parse(localStorage.getItem("chatSessions") || "[]");
      let activeSessionId = localStorage.getItem("activeSessionId") || null;
      let isStreaming = false;
      let apiKey = localStorage.getItem("deepseekApiKey") || "";

      function getActiveSession() {
        return sessions.find((s) => s.id === activeSessionId) || null;
      }

      function saveSessions() {
        localStorage.setItem("chatSessions", JSON.stringify(sessions));
        localStorage.setItem("activeSessionId", activeSessionId);
      }

      function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      }

      // ==================== DOM ====================
      const $ = (id) => document.getElementById(id);
      const chatContainer = $("chatContainer");
      const messageInput = $("messageInput");
      const sendBtn = $("sendBtn");
      const welcomeScreen = $("welcomeScreen");
      const emptyState = $("emptyState");
      const inputBar = $("inputBar");
      const sidebar = $("sidebar");
      const sidebarOverlay = $("sidebarOverlay");
      const sessionList = $("sessionList");
      const newSessionModal = $("newSessionModal");
      const settingsModal = $("settingsModal");
      const errorBanner = $("errorBanner");
      const romanticBg = $("romanticBg");

      // ==================== 浪漫飘心 ====================
      function createFloatingHearts() {
        const hearts = ["💕", "💗", "💖", "✨", "🌸", "💜", "🤍"];
        for (let i = 0; i < 10; i++) {
          const h = document.createElement("div");
          h.className = "floating-heart";
          h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
          h.style.left = Math.random() * 100 + "%";
          h.style.animationDuration = 10 + Math.random() * 15 + "s";
          h.style.animationDelay = Math.random() * 12 + "s";
          h.style.fontSize = 12 + Math.random() * 8 + "px";
          romanticBg.appendChild(h);
        }
      }

      function spawnLoveEffect(x, y) {
        const emojis = ["💕", "💗", "💖", "❤️"];
        for (let i = 0; i < 2; i++) {
          const el = document.createElement("div");
          el.className = "love-effect";
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          el.style.left = x + (Math.random() - 0.5) * 30 + "px";
          el.style.top = y - 20 + "px";
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 1500);
        }
      }

      // ==================== 侧边栏 ====================
      function openSidebar() {
        sidebar.classList.add("open");
        sidebarOverlay.classList.add("show");
      }
      function closeSidebar() {
        sidebar.classList.remove("open");
        sidebarOverlay.classList.remove("show");
      }

      function renderSessionList() {
        sessionList.innerHTML = "";
        if (sessions.length === 0) {
          sessionList.innerHTML =
            '<div style="text-align:center;padding:40px 20px;color:var(--text-secondary);font-size:14px;">暂无会话<br/>点击上方按钮创建</div>';
          return;
        }
        sessions.forEach((session) => {
          const item = document.createElement("div");
          item.className =
            "session-item" + (session.id === activeSessionId ? " active" : "");
          const lastMsg =
            session.messages.length > 0
              ? session.messages[session.messages.length - 1].content
              : "暂无消息";
          const preview =
            lastMsg.length > 30 ? lastMsg.slice(0, 30) + "..." : lastMsg;
          item.innerHTML = `
          <div class="session-avatar" style="background:linear-gradient(135deg,${session.color1 || "#FFD700"},${session.color2 || "#FFA500"})">${session.emoji || "🤖"}</div>
          <div class="session-info">
            <div class="session-name">${escapeHtml(session.name)}</div>
            <div class="session-preview">${escapeHtml(preview)}</div>
          </div>
          <button class="session-delete" data-id="${session.id}" title="删除">🗑️</button>
        `;
          item.addEventListener("click", (e) => {
            if (e.target.closest(".session-delete")) return;
            switchSession(session.id);
            closeSidebar();
          });
          item
            .querySelector(".session-delete")
            .addEventListener("click", (e) => {
              e.stopPropagation();
              deleteSession(session.id);
            });
          sessionList.appendChild(item);
        });
      }

      // ==================== 会话操作 ====================
      function createSession(name, emoji, systemPrompt) {
        const gradients = [
          ["#FFD700", "#FFA500"],
          ["#FF6B9D", "#FF8CB8"],
          ["#667eea", "#764ba2"],
          ["#43e97b", "#38f9d7"],
          ["#fa709a", "#fee140"],
          ["#a18cd1", "#fbc2eb"],
          ["#f093fb", "#f5576c"],
          ["#4facfe", "#00f2fe"],
        ];
        const [c1, c2] =
          gradients[Math.floor(Math.random() * gradients.length)];
        const session = {
          id: generateId(),
          name: name || "未命名",
          emoji: emoji || "🤖",
          systemPrompt: systemPrompt || "",
          color1: c1,
          color2: c2,
          messages: [],
          createdAt: Date.now(),
        };
        sessions.unshift(session);
        activeSessionId = session.id;
        saveSessions();
        renderSessionList();
        loadActiveSession();
        return session;
      }

      function deleteSession(id) {
        sessions = sessions.filter((s) => s.id !== id);
        if (activeSessionId === id) {
          activeSessionId = sessions.length > 0 ? sessions[0].id : null;
        }
        saveSessions();
        renderSessionList();
        loadActiveSession();
      }

      function switchSession(id) {
        activeSessionId = id;
        saveSessions();
        renderSessionList();
        loadActiveSession();
      }

      // ==================== 加载会话 ====================
      function loadActiveSession() {
        const session = getActiveSession();
        chatContainer
          .querySelectorAll(".message-group, .time-wrapper")
          .forEach((el) => el.remove());

        if (!session) {
          emptyState.style.display = "flex";
          welcomeScreen.style.display = "none";
          inputBar.style.display = "none";
          $("headerName").textContent = "AI Chat";
          $("headerAvatar").textContent = "💬";
          $("headerAvatar").style.background =
            "linear-gradient(135deg, #ccc, #999)";
          $("moodText").textContent = "";
          $("settingsSessionInfo").textContent = "无";
          return;
        }

        emptyState.style.display = "none";
        welcomeScreen.style.display = "flex";
        inputBar.style.display = "block";

        $("headerName").textContent = session.name;
        $("headerAvatar").textContent = session.emoji;
        $("headerAvatar").style.background =
          `linear-gradient(135deg, ${session.color1}, ${session.color2})`;
        $("settingsSessionInfo").textContent =
          `${session.name}（${session.messages.length} 条消息）`;

        $("welcomeAvatar").textContent = session.emoji;
        $("welcomeAvatar").style.background =
          `linear-gradient(135deg, ${session.color1}, ${session.color2})`;
        $("welcomeName").textContent = session.name;

        const subtitle = session.systemPrompt
          ? session.systemPrompt.length > 50
            ? session.systemPrompt.slice(0, 50) + "..."
            : session.systemPrompt
          : "开始聊天吧";
        $("welcomeSubtitle").textContent = subtitle;

        if (session.messages.length > 0) {
          welcomeScreen.style.display = "none";
          session.messages.forEach((msg) => {
            if (msg.content) appendMessage(msg, session);
          });
          scrollToBottom();
        }

        // 问候语（本地生成，不依赖后端）
        const hour = new Date().getHours();
        let greeting = "来聊天吧 ✨";
        if (hour >= 5 && hour < 9) greeting = "早安呀～ ☀️";
        else if (hour >= 12 && hour < 14) greeting = "中午好～记得吃饭 🍚";
        else if (hour >= 18 && hour < 22) greeting = "晚上好～ 🌙";
        else if (hour >= 22 || hour < 5) greeting = "夜深了，早点休息哦 💤";
        $("greetingText").textContent = greeting;

        // 心情（本地随机）
        const moods = [
          "😊 开心",
          "🥰 想你了",
          "😄 元气满满",
          "🤗 想抱抱",
          "💕 心里甜甜的",
        ];
        $("moodText").textContent =
          moods[Math.floor(Math.random() * moods.length)];

        updateApiKeyStatus();
        updateSendButton();
      }

      function updateApiKeyStatus() {
        if (apiKey) {
          $("statusDot").className = "status-dot connected";
        } else {
          $("statusDot").className = "status-dot disconnected";
          $("moodText").textContent = "请设置 API Key";
        }
      }

      // ==================== 消息发送（直连 DeepSeek API） ====================
      async function sendMessage() {
        const session = getActiveSession();
        if (!session || isStreaming) return;

        const content = messageInput.value.trim();
        if (!content) return;

        if (!apiKey) {
          showError("请先在设置中填写 API Key 🔑");
          settingsModal.classList.add("show");
          return;
        }

        welcomeScreen.style.display = "none";

        const userMsg = { role: "user", content, timestamp: Date.now() };
        session.messages.push(userMsg);
        saveSessions();
        appendMessage(userMsg, session);

        messageInput.value = "";
        autoResize();
        updateSendButton();

        isStreaming = true;
        updateSendButton();

        const aiMsg = { role: "assistant", content: "", timestamp: Date.now() };
        session.messages.push(aiMsg);
        const aiElement = appendMessage(aiMsg, session, true);

        try {
          // 构建消息列表
          const finalMessages = [];
          if (session.systemPrompt) {
            finalMessages.push({
              role: "system",
              content: session.systemPrompt,
            });
          }
          const history = session.messages
            .filter((m) => m.role !== "assistant" || m.content)
            .slice(0, -1);
          finalMessages.push(
            ...history.map((m) => ({ role: m.role, content: m.content })),
          );

          const response = await fetch(DEEPSEEK_API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${apiKey}`,
            },
            body: JSON.stringify({
              model: "deepseek-chat",
              messages: finalMessages,
              temperature: 0.8,
              max_tokens: 1024,
              stream: true,
            }),
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(
              errData.error?.message || `API 请求失败 (${response.status})`,
            );
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "",
            fullContent = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";
            for (const line of lines) {
              const trimmed = line.trim();
              if (!trimmed || !trimmed.startsWith("data: ")) continue;
              const data = trimmed.slice(6);
              if (data === "[DONE]") continue;
              try {
                const parsed = JSON.parse(data);
                const delta = parsed.choices?.[0]?.delta?.content;
                if (delta) {
                  fullContent += delta;
                  updateStreamMessage(aiElement, fullContent);
                }
              } catch (e) {
                /* ignore parse errors */
              }
            }
          }

          aiMsg.content = fullContent;
          saveSessions();
          updateStreamMessage(aiElement, fullContent, true);
          renderSessionList();
        } catch (error) {
          console.error("发送失败:", error);
          session.messages.pop();
          saveSessions();
          aiElement.remove();
          showError(error.message || "发送失败了 💔");
        } finally {
          isStreaming = false;
          updateSendButton();
        }
      }

      // ==================== 消息渲染 ====================
      function appendMessage(msg, session, isStreaming = false) {
        if (msg.timestamp) {
          const tw = document.createElement("div");
          tw.className = "time-wrapper";
          tw.innerHTML = `<span class="message-time">${formatTime(msg.timestamp)}</span>`;
          chatContainer.appendChild(tw);
        }

        const group = document.createElement("div");
        group.className = "message-group";
        const isUser = msg.role === "user";
        group.innerHTML = `
        <div class="message-row ${msg.role}">
          <div class="avatar ${isUser ? "user-avatar" : "bot-avatar"}" ${!isUser ? `style="background:linear-gradient(135deg,${session.color1},${session.color2})"` : ""}>${isUser ? "🌸" : session.emoji}</div>
          <div class="bubble ${isUser ? "user-bubble" : "bot-bubble"}">
            ${isStreaming ? '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>' : formatContent(msg.content)}
          </div>
        </div>
      `;
        chatContainer.appendChild(group);
        scrollToBottom();
        return group;
      }

      function updateStreamMessage(el, content, isFinal = false) {
        const bubble = el.querySelector(".bubble");
        bubble.innerHTML =
          formatContent(content) +
          (isFinal
            ? ""
            : '<span style="display:inline-block;width:2px;height:14px;background:var(--pink-400);margin-left:2px;animation:pulse 0.8s infinite;vertical-align:middle;border-radius:1px;"></span>');
        scrollToBottom();
      }

      // ==================== 工具函数 ====================
      function formatContent(text) {
        if (!text) return "";

        // 1. 先提取并替换转账卡片（已收款）
        // 格式: | ¥xxx.xxx 已收款 | / | :--- |
        text = text.replace(
          /\|\s*¥([\d.]+)\s*已收款\s*\|\s*\n?\s*\|\s*:?-+\s*\|/g,
          (match, amount) => {
            return `<div class="transfer-card"><div class="transfer-icon">💰</div><div class="transfer-amount">¥${amount}</div><div class="transfer-status">已收款</div></div>`;
          },
        );

        // 2. 提取待收款转账卡片
        // 格式: | [转账] 待收款  xxx.xxx元  | / | :--- |
        text = text.replace(
          /\|\s*\[转账\]\s*待收款\s+([\d.]+)元\s*\|\s*\n?\s*\|\s*:?-+\s*\|/g,
          (match, amount) => {
            return `<div class="transfer-card pending"><div class="transfer-icon">📩</div><div class="transfer-amount">¥${amount}</div><div class="transfer-status">待收款 · 点击收取</div></div>`;
          },
        );

        // 3. 提取时间戳（反引号包裹的时间，如 `12:48 am`）
        text = text.replace(
          /`(\d{1,2}:\d{2}\s*(?:am|pm|AM|PM)?)`/gi,
          (match, time) => {
            return `<div class="chat-timestamp">${time}</div>`;
          },
        );

        // 4. 提取旁白/动作描述（独立行的反引号内容）
        // 匹配独立一行的 `旁白内容`（不是时间戳的）
        text = text.replace(/^`([^`]+)`$/gm, (match, content) => {
          // 排除已经被替换为时间戳的情况
          if (content.match(/^\d{1,2}:\d{2}\s*(am|pm|AM|PM)?$/i)) return match;
          return `<div class="narration">${content}</div>`;
        });

        // 5. 基础 HTML 转义
        text = text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

        // 6. Markdown 代码块（不影响上面的解析，因为已替换）
        text = text.replace(
          /```(\w*)\n([\s\S]*?)```/g,
          '<pre style="background:rgba(255,107,157,0.08);border-radius:10px;padding:10px 12px;overflow-x:auto;margin:6px 0;font-size:13px;font-family:monospace;"><code>$2</code></pre>',
        );

        // 7. 行内代码（剩余的反引号）
        text = text.replace(
          /`([^`]+)`/g,
          '<code style="background:rgba(255,107,157,0.08);padding:1px 5px;border-radius:4px;font-size:13px;">$1</code>',
        );

        // 8. 粗体、斜体
        text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        text = text.replace(/\*(.+?)\*/g, "<em>$1</em>");

        // 9. 换行
        text = text.replace(/\n/g, "<br>");

        return text;
      }

      function escapeHtml(str) {
        const d = document.createElement("div");
        d.textContent = str;
        return d.innerHTML;
      }

      function autoResize() {
        messageInput.style.height = "auto";
        messageInput.style.height =
          Math.min(messageInput.scrollHeight, 100) + "px";
      }
      function updateSendButton() {
        sendBtn.classList.toggle(
          "active",
          messageInput.value.trim().length > 0 && !isStreaming,
        );
      }
      function scrollToBottom() {
        requestAnimationFrame(() => {
          chatContainer.scrollTop = chatContainer.scrollHeight;
        });
      }
      function formatTime(ts) {
        const d = new Date(ts),
          now = new Date(),
          t = d.toLocaleTimeString("zh-CN", {
            hour: "2-digit",
            minute: "2-digit",
          });
        return d.toDateString() === now.toDateString()
          ? t
          : `${d.getMonth() + 1}/${d.getDate()} ${t}`;
      }
      function showError(msg) {
        errorBanner.textContent = msg;
        errorBanner.style.display = "block";
        setTimeout(() => (errorBanner.style.display = "none"), 4000);
      }

      // ==================== 初始化 ====================
      function init() {
        createFloatingHearts();
        $("apiKeyInput").value = apiKey;
        renderSessionList();
        loadActiveSession();

        // 侧边栏
        $("menuBtn").addEventListener("click", openSidebar);
        $("sidebarClose").addEventListener("click", closeSidebar);
        sidebarOverlay.addEventListener("click", closeSidebar);

        // 新建会话
        $("newChatBtn").addEventListener("click", () => {
          $("sessionNameInput").value = "";
          $("sessionEmojiInput").value = "";
          $("sessionPromptInput").value = "";
          newSessionModal.classList.add("show");
        });
        $("emptyNewBtn").addEventListener("click", () => {
          $("sessionNameInput").value = "";
          $("sessionEmojiInput").value = "";
          $("sessionPromptInput").value = "";
          newSessionModal.classList.add("show");
        });
        $("closeNewSession").addEventListener("click", () =>
          newSessionModal.classList.remove("show"),
        );
        newSessionModal.addEventListener("click", (e) => {
          if (e.target === newSessionModal)
            newSessionModal.classList.remove("show");
        });

        $("createSessionBtn").addEventListener("click", () => {
          const name = $("sessionNameInput").value.trim();
          const emoji = $("sessionEmojiInput").value.trim() || "🤖";
          const prompt = $("sessionPromptInput").value.trim();
          if (!name) {
            $("sessionNameInput").style.borderColor = "#FF3B30";
            $("sessionNameInput").focus();
            return;
          }
          createSession(name, emoji, prompt);
          newSessionModal.classList.remove("show");
          closeSidebar();
        });

        // 设置
        $("settingsBtn").addEventListener("click", () =>
          settingsModal.classList.add("show"),
        );
        $("closeSettings").addEventListener("click", () =>
          settingsModal.classList.remove("show"),
        );
        settingsModal.addEventListener("click", (e) => {
          if (e.target === settingsModal)
            settingsModal.classList.remove("show");
        });

        // API Key 保存
        $("apiKeyInput").addEventListener("input", () => {
          apiKey = $("apiKeyInput").value.trim();
          localStorage.setItem("deepseekApiKey", apiKey);
          updateApiKeyStatus();
        });

        $("clearCurrentChat").addEventListener("click", () => {
          const session = getActiveSession();
          if (session) {
            session.messages = [];
            saveSessions();
            loadActiveSession();
            renderSessionList();
          }
          settingsModal.classList.remove("show");
        });

        // 输入
        messageInput.addEventListener("input", () => {
          autoResize();
          updateSendButton();
        });
        messageInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
          }
        });
        sendBtn.addEventListener("click", () => {
          sendMessage();
          const r = sendBtn.getBoundingClientRect();
          spawnLoveEffect(r.left + r.width / 2, r.top);
        });
      }

      init();
    </script>
  </body>
</html>
